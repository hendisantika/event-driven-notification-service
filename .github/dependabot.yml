version: 2
updates:
  - package-ecosystem: maven
    directory: "/"
    schedule:
      interval: daily
      time: '05:00'
      timezone: Asia/Jakarta
    open-pull-requests-limit: 10
    reviewers:
      - hendisantika
    labels:
      - dependencies
      - maven
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      spring-boot:
        patterns:
          - "org.springframework*"
      testing:
        patterns:
          - "org.junit*"
          - "org.mockito*"
          - "org.assertj*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
      time: '05:00'
      timezone: Asia/Jakarta
    open-pull-requests-limit: 10
    reviewers:
      - hendisantika
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: '05:00'
      timezone: Asia/Jakarta
    open-pull-requests-limit: 5
    reviewers:
      - hendisantika
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "docker"
      include: "scope"
